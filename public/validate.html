<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Validator | Nexus Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/nexus-ui.js"></script>
    <script>
        // -----------------------------------------
        // AUTHENTICATION GATEKEEPER
        // -----------------------------------------
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/login';
        }

        const getAuthHeaders = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
        });

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/login';
        }

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        nexus: {
                            dark: '#0B0C10',
                            gray: '#1F2833',
                            light: '#C5C6C7',
                            primary: '#66FCF1',
                            secondary: '#45A29E',
                            success: '#10B981',
                            danger: '#EF4444'
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply bg-nexus-gray/60 backdrop-blur-md border border-white/10;
            }
        }
        body {
            background-color: #0B0C10;
            color: #C5C6C7;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center py-10 px-6 relative overflow-hidden">
    <!-- Navbar -->
    <nav class="absolute top-0 w-full z-50 glass border-b-0 border-white/5 py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="/admin" class="text-2xl font-display font-bold text-white tracking-wide uppercase">
                Nexus<span class="text-nexus-primary uppercase">Events</span> <span class="text-xs absolute mt-1 ml-2 text-white/50 tracking-widest uppercase">Ticket Validator</span>
            </a>
            <div class="space-x-4 hidden md:flex items-center">
                <a href="/admin" class="text-nexus-light hover:text-white transition-colors">Return to Dashboard</a>
                <button onclick="logout()" class="ml-4 border border-nexus-danger/50 text-nexus-danger/80 hover:bg-nexus-danger hover:text-white px-4 py-1.5 rounded-lg text-sm transition-all shadow-[0_0_10px_rgba(239,68,68,0.1)]">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-md w-full z-10 animate-fade-in-up mt-20">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-display font-bold text-white mb-2">Gate Check-in</h1>
            <p class="text-nexus-light">Scan a QR code or manually enter the TKT ID.</p>
        </div>

        <!-- Scanner Card -->
        <div class="glass w-full rounded-3xl p-8 mb-6 shadow-2xl border border-nexus-primary/30 relative">            
            <form id="validateForm" onsubmit="handleValidate(event)">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-nexus-light/80 mb-2 uppercase tracking-wide">Ticket ID Code</label>
                    <input type="text" id="ticketInput" required class="w-full bg-nexus-dark/50 border border-white/20 rounded-xl px-4 py-4 text-white text-xl font-mono text-center tracking-widest focus:outline-none focus:border-nexus-primary focus:ring-1 focus:ring-nexus-primary shadow-inner" placeholder="TKT-XXXXXX">
                </div>
                <!-- Action Buttons: dynamically swapped based on state -->
                <button id="validateBtn" type="submit" class="w-full bg-nexus-primary text-nexus-dark font-bold text-lg py-4 rounded-xl hover:bg-white transition-all duration-300 transform hover:scale-[1.02] shadow-[0_0_20px_rgba(102,252,241,0.3)]">
                    Verify Registration
                </button>
            </form>
            
            <button id="admitBtn" type="button" onclick="admitTicket()" class="w-full mt-4 bg-nexus-success text-white font-bold text-lg py-4 rounded-xl hover:bg-nexus-success/80 transition-all duration-300 transform hover:scale-[1.02] shadow-[0_0_20px_rgba(16,185,129,0.3)] hidden">
                CONFIRM & ADMIT GUEST
            </button>

            <div id="resultBox" class="mt-6 rounded-xl p-5 hidden transition-all duration-300">
                <!-- Data injection point -->
            </div>
        </div>

        <div class="text-center">
            <p class="text-xs text-nexus-light/40">Nexus Events</p>
        </div>
    </div>

    <script>
        // On Boot: check if URL contains a ?ticket=... param directly via a scanned QR Link
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const targetTicket = params.get('ticket');
            if(targetTicket) {
                document.getElementById('ticketInput').value = targetTicket;
                document.getElementById('validateBtn').click();
            }
        };

        async function handleValidate(e) {
            e.preventDefault();
            
            if(localStorage.getItem('currentScannedTicket')) {
                // If they re-submit while a ticket is already queued
                localStorage.removeItem('currentScannedTicket');
                document.getElementById('admitBtn').classList.add('hidden');
            }

            const btn = document.getElementById('validateBtn');
            const input = document.getElementById('ticketInput');
            const resultBox = document.getElementById('resultBox');
            
            const ticketId = input.value.trim().toUpperCase();
            if(!ticketId) return;

            btn.innerText = "Checking...";
            btn.disabled = true;
            resultBox.classList.add('hidden');
            resultBox.className = 'mt-6 rounded-xl p-5 hidden transition-all duration-300';
            
            try {
                const response = await fetch('/api/admin/verify-ticket', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ ticketId })
                });

                if(response.status === 401 || response.status === 403) {
                    return logout();
                }

                const data = await response.json();
                resultBox.classList.remove('hidden');

                if (response.ok && data.success) {
                    // Success View (Step 1)
                    resultBox.classList.add('bg-nexus-success/10', 'border', 'border-nexus-success/30');
                    resultBox.innerHTML = `
                        <div class="flex flex-col items-center justify-center text-nexus-light">
                            <div class="text-nexus-success font-bold text-xl mb-3">Ticket Successfully Verified!</div>
                            <span class="text-xs uppercase tracking-widest text-nexus-primary mb-1">Valid Guest:</span>
                            <h2 class="text-2xl font-bold text-white">${data.ticket.customerName}</h2>
                            <p class="text-sm mt-1 opacity-80">${data.eventName}</p>
                        </div>
                    `;
                    // Expose the ADMIT button and lock context
                    document.getElementById('admitBtn').classList.remove('hidden');
                    localStorage.setItem('currentScannedTicket', ticketId);
                    btn.classList.add('hidden');
                } else {
                    // Fail View
                    resultBox.classList.add('bg-nexus-danger/10', 'border', 'border-nexus-danger/30');
                    resultBox.innerHTML = `
                        <div class="flex items-center gap-3 text-nexus-danger font-bold mb-2 justify-center">
                            INVALID OR USED!
                        </div>
                        <div class="text-nexus-light text-sm text-center">
                            ${data.message || 'Unknown error occurred.'}
                        </div>
                    `;
                    input.select();
                }
            } catch (err) {
                resultBox.classList.remove('hidden');
                resultBox.classList.add('bg-nexus-danger/10', 'border', 'border-nexus-danger/30');
                resultBox.innerHTML = `<div class="text-nexus-danger font-bold text-sm">Network error trying to validate.</div>`;
            }

            btn.innerText = "Verify Registration";
            btn.disabled = false;
        }

        function resetScanner() {
            const resultBox = document.getElementById('resultBox');
            const btn = document.getElementById('validateBtn');
            const admitBtn = document.getElementById('admitBtn');
            const input = document.getElementById('ticketInput');
            
            input.value = '';
            resultBox.classList.add('hidden');
            btn.classList.remove('hidden');
            admitBtn.classList.add('hidden');
            admitBtn.innerText = "CONFIRM & ADMIT GUEST";
            admitBtn.disabled = false;
            localStorage.removeItem('currentScannedTicket');
            
            // Re-focus the input cleanly for physical scanners
            input.focus();
        }

        async function admitTicket() {
            const ticketId = localStorage.getItem('currentScannedTicket');
            if(!ticketId) return;

            const admitBtn = document.getElementById('admitBtn');
            const resultBox = document.getElementById('resultBox');
            const btn = document.getElementById('validateBtn');
            const input = document.getElementById('ticketInput');
            
            admitBtn.innerText = "Admitting...";
            admitBtn.disabled = true;

            try {
                const response = await fetch('/api/admin/admit-ticket', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ ticketId })
                });

                if(response.status === 401 || response.status === 403) return logout();

                const data = await response.json();
                
                if(response.ok && data.success) {
                    resultBox.className = 'mt-6 rounded-xl p-5 bg-nexus-success/10 border border-nexus-success/30 transition-all duration-300 flex flex-col items-center';
                    resultBox.innerHTML = `
                        <div class="flex items-center gap-3 text-nexus-success font-bold text-xl mb-2 justify-center text-center">
                            Guest Admitted Successfully!
                        </div>
                        <button type="button" onclick="resetScanner()" class="w-full max-w-xs bg-nexus-dark/50 border border-nexus-success/50 text-nexus-success hover:bg-nexus-success hover:text-white transition-all duration-300 py-3 rounded-xl font-bold shadow-[0_0_10px_rgba(16,185,129,0.1)]">
                            Verify Another Ticket
                        </button>
                    `;
                    document.getElementById('admitBtn').classList.add('hidden'); // Immediately hide admit button so it's not sitting beneath it
                }
            } catch(e) {
                admitBtn.innerText = "Error (Retry)";
                admitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
