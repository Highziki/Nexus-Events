<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Events | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/nexus-ui.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    colors: {
                        nexus: { dark: '#0B0C10', gray: '#1F2833', light: '#C5C6C7', primary: '#66FCF1', secondary: '#45A29E', danger: '#EF4444' }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities { .glass { @apply bg-nexus-gray/60 backdrop-blur-md border border-white/10; } }
        body { background-color: #0B0C10; color: #C5C6C7; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center py-10 px-6 relative overflow-hidden">
    <div class="max-w-md w-full z-10 animate-fade-in-up">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-display font-bold text-white tracking-wide mb-2">
                NEXUS<span class="text-nexus-primary">ADMIN</span>
            </h1>
            <p class="text-nexus-light/60 text-sm tracking-widest uppercase">Secure Portal Access</p>
        </div>

        <div class="glass rounded-3xl p-8 shadow-2xl relative">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <label class="block text-sm font-medium text-nexus-light/80 mb-2 uppercase tracking-wide">Username</label>
                    <input type="text" id="username" required class="w-full bg-nexus-dark/50 border border-white/20 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-nexus-primary focus:ring-1 focus:ring-nexus-primary" placeholder="Enter username">
                </div>
                <div class="mb-6 relative">
                    <label class="block text-sm font-medium text-nexus-light/80 mb-2 uppercase tracking-wide">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required class="w-full bg-nexus-dark/50 border border-white/20 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-nexus-primary focus:ring-1 focus:ring-nexus-primary" placeholder="Enter Password">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-nexus-light/40 hover:text-nexus-primary transition-colors">
                            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                </div>
                
                <button id="loginBtn" type="submit" class="w-full bg-nexus-primary text-nexus-dark font-bold text-lg py-4 rounded-xl hover:bg-white transition-all duration-300 transform shadow-[0_0_20px_rgba(102,252,241,0.3)]">
                    Login
                </button>
            </form>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Logging in...";

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin';
                } else {
                    nexusNotify(data.message || 'Authentication Failed', 'error');
                    btn.innerText = "Login";
                }
            } catch (err) {
                nexusNotify('Network error connecting to auth server.', 'error');
                btn.innerText = "Login";
            }
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />';
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        }
    </script>
</body>
</html>
