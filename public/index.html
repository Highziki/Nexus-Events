<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Events | Premium Event Ticketing</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/nexus-ui.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        nexus: {
                            dark: '#0B0C10',
                            gray: '#1F2833',
                            light: '#C5C6C7',
                            primary: '#66FCF1',
                            secondary: '#45A29E'
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply bg-nexus-gray/60 backdrop-blur-md border border-white/10;
            }
            .text-gradient {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-nexus-primary to-blue-500;
            }
        }
        body {
            background-color: #0B0C10;
            color: #C5C6C7;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass border-b-0 border-white/5 py-4">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <a href="/" class="text-2xl font-display font-bold text-white tracking-wide">
                NEXUS<span class="text-nexus-primary">EVENTS</span>
            </a>
            <div class="space-x-6 hidden md:block">
                <a href="/admin" class="text-nexus-light hover:text-white transition-colors font-medium">Admin</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative py-20 px-6 overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-b from-nexus-secondary/20 to-transparent opacity-50"></div>
        <div class="max-w-4xl mx-auto text-center relative z-10">
            <h1 class="text-5xl md:text-7xl font-display font-extrabold text-white mb-6 leading-tight">
                Experience Life's <br/> <span class="text-gradient">Best Moments</span>
            </h1>
            <p class="text-lg md:text-xl text-nexus-light mb-10 max-w-2xl mx-auto">
                Discover and book tickets to the most exclusive tech conferences, music festivals, and creative workshops happening around you.
            </p>
            <a href="#events" class="inline-block bg-nexus-primary text-nexus-dark px-8 py-3 rounded-full font-bold hover:bg-white transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(102,252,241,0.5)]">
                Explore Events
            </a>
        </div>
    </section>

    <!-- Events Listing -->
    <section id="events" class="py-16 px-6 flex-grow">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-end mb-12">
                <h2 class="text-3xl md:text-4xl font-display font-bold text-white">Upcoming Events</h2>
                <div class="text-sm text-nexus-primary font-medium tracking-wide uppercase">Curated for you</div>
            </div>
            
            <!-- Events Grid -->
            <div id="eventsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Event cards will be dynamically injected here by JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="glass py-8 mt-auto">
        <div class="max-w-6xl mx-auto px-6 text-center text-sm text-nexus-light/60">
            &copy; 2026 Nexus Events.
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderEvents('eventsGrid');
        });
    </script>
</body>
</html>
